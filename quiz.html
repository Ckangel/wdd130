<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <header>

<form id="quizForm">

      <th>Question</th>
    </tr>
    <tr class="answer-row">
      <td>
        1. What does HTML stand for?<br>
        <input type="text" name="q1" id="q1" placeholder="Your answer">

    <tr class="question-row">
      <th>Question</th>
    </tr>
    <tr class="answer-row">

      </td>
    </tr>
    <tr class="question-row">
      <th>Question</th>
    </tr>
    <tr class="answer-row">
      <td>
        3. Which property is used to change the background color?<br>
        <select name="q3" id="q3">
          <option value="">Select an option</option>
          <option value="background-color">background-color</option>
          <option value="color">color</option>
          <option value="font-size">font-size</option>
        </select>
      </td>
    </tr>
    <tr class="question-row">
      <th>Question</th>
    </tr>
    <tr class="answer-row">
      <td>
        4. How do you select an element with id "demo"?<br>
        <select name="q4" id="q4">
          <option value="">Select an option</option>
          <option value="#demo">#demo</option>
          <option value=".demo">.demo</option>
          <option value="demo">demo</option>
          <option value="demo"></option>
        </select>
      </td>
    </tr>
  </table>
  <button type="button"="submitQuiz()">Submit Test</button>
